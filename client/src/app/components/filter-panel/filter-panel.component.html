<div class="filter-panel-overlay" *ngIf="isVisible" (click)="close()">
  <div class="filter-panel-container" (click)="$event.stopPropagation()">
    <div class="filter-panel-header">
      <h2>Filters</h2>
      <div class="header-actions">
        <button class="text-btn" (click)="resetFilters()">Reset</button>
        <button class="close-btn" (click)="close()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="filter-panel-body">
      <!-- Category Filter -->
      <div class="filter-section">
        <h3>Category</h3>
        <div class="filter-options">
          <label class="filter-option" *ngFor="let cat of categories">
            <input type="radio" [(ngModel)]="filters.category" [value]="cat">
            <span class="option-label">{{ cat }}</span>
          </label>
        </div>
      </div>

      <!-- Status Filter -->
      <div class="filter-section">
        <h3>Status</h3>
        <div class="filter-options">
          <label class="filter-option" *ngFor="let status of statuses">
            <input type="radio" [(ngModel)]="filters.status" [value]="status">
            <span class="option-label">{{ status }}</span>
          </label>
        </div>
      </div>

      <!-- Department Filter -->
      <div class="filter-section">
        <h3>Department</h3>
        <div class="filter-options">
          <label class="filter-option" *ngFor="let dept of departments">
            <input type="radio" [(ngModel)]="filters.department" [value]="dept">
            <span class="option-label">{{ dept }}</span>
          </label>
        </div>
      </div>

      <!-- Date Range Filter -->
      <div class="filter-section">
        <h3>Date Range</h3>
        <div class="filter-options">
          <label class="filter-option" *ngFor="let range of dateRanges">
            <input type="radio" [(ngModel)]="filters.dateRange" [value]="range.value">
            <span class="option-label">{{ range.label }}</span>
          </label>
        </div>
      </div>

      <!-- Custom Date Range -->
      <div class="filter-section" *ngIf="filters.dateRange === 'custom'">
        <h3>Custom Date Range</h3>
        <div class="date-range-inputs">
          <div class="date-input">
            <label>Start Date</label>
            <input type="date" [(ngModel)]="filters.startDate">
          </div>
          <div class="date-input">
            <label>End Date</label>
            <input type="date" [(ngModel)]="filters.endDate">
          </div>
        </div>
      </div>

      <!-- Additional Filters -->
      <div class="filter-section">
        <h3>Additional Filters</h3>
        <div class="checkbox-filters">
          <label class="checkbox-option">
            <input type="checkbox" [(ngModel)]="filters.starred">
            <span class="option-label">Starred Only</span>
          </label>
          <label class="checkbox-option">
            <input type="checkbox" [(ngModel)]="filters.archived">
            <span class="option-label">Include Archived</span>
          </label>
        </div>
      </div>
    </div>

    <div class="filter-panel-footer">
      <div class="active-filters">
        <span class="filter-count">{{ activeFilterCount }} active filter{{ activeFilterCount !== 1 ? 's' : '' }}</span>
      </div>
      <button class="btn btn-primary" (click)="applyFilters()">Apply Filters</button>
    </div>
  </div>
</div>
